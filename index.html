<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchooMy センサーモニター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --teal:#3AABA8;--orange:#E88A0A;--blue:#2E8EC4;--cream:#F5E4C4;
    --dark:#0f1923;--panel:#162333;--border:rgba(58,171,168,0.25);
    --text:#e8f4f4;--muted:#8ab4bf;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:#0f1923}
  body{background:#0f1923 !important;color:#e8f4f4 !important;font-family:'Outfit',sans-serif;min-height:100vh;-webkit-text-fill-color:#e8f4f4}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(58,171,168,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(58,171,168,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

  header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);background:#0d1a28;backdrop-filter:blur(12px)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{width:44px;height:44px;flex-shrink:0}
  .logo-text{font-size:17px;font-weight:700;color:#3AABA8 !important;-webkit-text-fill-color:#3AABA8}
  .logo-sub{font-size:10px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;letter-spacing:.1em;text-transform:uppercase}
  .demo-badge{background:rgba(232,138,10,0.2);border:1px solid rgba(232,138,10,0.5);color:#E88A0A !important;-webkit-text-fill-color:#E88A0A;font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#8ab4bf;flex-shrink:0;transition:all .3s}
  .status-dot.connected{background:#4cff91;box-shadow:0 0 8px #4cff91;animation:pulse 2s infinite}
  .status-dot.connecting{background:#E88A0A;animation:pulse 0.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* ── 選択画面 ── */
  #select-screen{position:relative;z-index:10;padding:28px 20px;max-width:600px;margin:0 auto}
  .select-title{font-size:22px;font-weight:800;margin-bottom:4px;color:#e8f4f4 !important;-webkit-text-fill-color:#e8f4f4}
  .select-sub{font-size:14px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;margin-bottom:24px}
  .sensor-list{display:flex;flex-direction:column;gap:10px}

  .sensor-item{
    display:flex;align-items:center;gap:16px;
    background:#162333;border:1px solid rgba(58,171,168,0.25);
    border-radius:16px;padding:14px 18px;
    cursor:pointer;transition:all .18s;position:relative;overflow:hidden;
  }
  .sensor-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--item-color,#3AABA8);border-radius:3px 0 0 3px}
  .sensor-item:hover{border-color:var(--item-color,#3AABA8);transform:translateX(4px);box-shadow:-4px 0 16px rgba(0,0,0,0.4)}
  .sensor-item:active{transform:translateX(2px)}

  .item-svg{width:52px;height:52px;flex-shrink:0}
  .item-svg svg{width:100%;height:100%}
  .item-info{flex:1}
  .item-name{font-size:16px;font-weight:700;margin-bottom:2px;color:#e8f4f4 !important;-webkit-text-fill-color:#e8f4f4}
  .item-desc{font-size:12px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf}
  .item-arrow{font-size:20px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf}

  /* ── モニター画面 ── */
  #monitor-screen{display:none;position:relative;z-index:10;padding:24px 20px;max-width:680px;margin:0 auto}
  .monitor-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .btn-back{padding:8px 16px;background:transparent;border:1px solid rgba(58,171,168,0.3);border-radius:8px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
  .btn-back:hover{border-color:#3AABA8;color:#3AABA8 !important;-webkit-text-fill-color:#3AABA8}
  .monitor-title{font-size:18px;font-weight:800;color:#e8f4f4 !important;-webkit-text-fill-color:#e8f4f4}

  /* ── センサーカード ── */
  .sensor-card{background:#162333;border:1px solid rgba(58,171,168,0.25);border-radius:20px;padding:28px;position:relative;overflow:hidden;animation:fadeIn .35s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .sensor-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,#3AABA8)}

  .card-top{display:flex;align-items:center;gap:16px;margin-bottom:24px}
  .card-svg{width:64px;height:64px;flex-shrink:0}
  .card-svg svg{width:100%;height:100%}
  .card-name{font-size:20px;font-weight:800;color:#e8f4f4 !important;-webkit-text-fill-color:#e8f4f4}
  .card-desc{font-size:12px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;margin-top:2px}

  .value-display{display:flex;align-items:flex-end;gap:8px;margin-bottom:24px}
  .big-value{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:600;line-height:1;color:#e8f4f4 !important;-webkit-text-fill-color:#e8f4f4}
  .big-unit{font-size:22px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;padding-bottom:10px}

  .digital-display{margin-bottom:24px}
  .digital-badge{display:inline-block;padding:14px 36px;border-radius:100px;font-size:32px;font-weight:800;font-family:'JetBrains Mono',monospace;transition:all .2s}
  .digital-badge.on{background:rgba(76,255,145,0.15);color:#4cff91 !important;-webkit-text-fill-color:#4cff91;border:1px solid rgba(76,255,145,0.3);box-shadow:0 0 20px rgba(76,255,145,0.15)}
  .digital-badge.off{background:rgba(122,157,170,0.08);color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;border:1px solid rgba(58,171,168,0.2)}

  .graph-wrap{width:100%;height:100px;background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;margin-bottom:16px}
  .graph-wrap svg{width:100%;height:100%}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stat-box{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;text-align:center}
  .stat-label{font-size:10px;color:#8ab4bf !important;-webkit-text-fill-color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
  .stat-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:#e8f4f4 !important;-webkit-text-fill-color:#e8f4f4}

  /* ── レスポンシブ ── */
  @media(max-width:600px){
    #select-screen{padding:20px 16px}
    #monitor-screen{padding:16px 14px}
    .select-title{font-size:18px}
    .sensor-item{padding:12px 14px;gap:12px}
    .item-svg{width:44px;height:44px}
    .item-name{font-size:15px}
    .sensor-card{padding:20px 16px}
    .card-svg{width:52px;height:52px}
    .card-name{font-size:17px}
    .big-value{font-size:56px}
    .big-unit{font-size:18px}
    .digital-badge{font-size:26px;padding:12px 28px}
    .stat-value{font-size:15px}
    header{padding:14px 16px}
  }
  @media(max-width:380px){
    .big-value{font-size:44px}
    .stats{gap:8px}
    .stat-box{padding:10px 8px}
    .item-svg{width:38px;height:38px}
    .sensor-card{padding:16px 14px}
  }
</style>
</head>

// ── センサー定義 ───────────────────────────────────────

  {id:'water',   name:'水温センサー',   desc:'DS18B20 / GPIO33',   iconKey:'ondo',     color:'#2E8EC4', unit:'℃',  type:'analog',  min:5,   max:30  },
  {id:'light',   name:'明るさセンサー', desc:'CdS / A5',           iconKey:'akarusa',  color:'#E88A0A', unit:'lux',type:'analog',  min:0,   max:500 },
  {id:'moisture',name:'土壌水分',       desc:'アナログ / A5',      iconKey:'dojou',    color:'#4caf50', unit:'raw',type:'analog',  min:500, max:3500},
  {id:'sound',   name:'音センサー',     desc:'アナログ / A5',      iconKey:'oto',      color:'#9c27b0', unit:'raw',type:'analog',  min:1800,max:2500},
  {id:'magnet',  name:'磁力センサー',   desc:'アナログ / A5',      iconKey:'jiryoku',  color:'#795548', unit:'raw',type:'analog',  min:1900,max:2100},
  {id:'switch',  name:'スイッチ',       desc:'デジタル / GPIO33',  iconKey:'switch_s', color:'#3AABA8', unit:'',   type:'digital'                   },
  {id:'touch',   name:'タッチセンサー', desc:'デジタル / GPIO33',  iconKey:'touch',    color:'#3AABA8', unit:'',   type:'digital'                   },
  {id:'pass',    name:'通過センサー',   desc:'デジタル / GPIO33',  iconKey:'tusuka',   color:'#2E8EC4', unit:'',   type:'digital'                   },
  {id:'dist',    name:'距離センサー',   desc:'超音波 / GPIO17+33', iconKey:'kyori',    color:'#9c27b0', unit:'cm', type:'analog',  min:2,   max:80  },
  {id:'imu',     name:'加速度センサー', desc:'MPU6050 / I2C',      iconKey:'kasokudo', color:'#3AABA8', unit:'G',  type:'imu' },
];

function iconHTML(key) {
  const ic = ICONS[key];
  if (!ic) return '';
  if (ic.startsWith('<div')) return ic;
  return ic;
}

// ── リスト描画 ────────────────────────────────────────
function buildList() {
  const listEl = document.getElementById('sensor-list');
  SENSORS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sensor-item';
    el.style.setProperty('--item-color', s.color);
    el.innerHTML = `
      <div class="item-svg">${iconHTML(s.iconKey)}</div>
      <div class="item-info">
        <div class="item-name">${s.name}</div>
        <div class="item-desc">${s.desc}</div>
      </div>
      <span class="item-arrow">›</span>`;
    el.onclick = () => startMonitor(s);
    listEl.appendChild(el);
  });
}
buildList();

// ── モニター ──────────────────────────────────────────

function startMonitor(s) {
  sensorHistory = []; onCount = 0; elapsed = 0; lastDig = 0;
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('monitor-screen').style.display = 'block';
  document.getElementById('monitor-title').textContent = s.name;
  buildCard(s);
  if (animTimer) clearInterval(animTimer);
  animTimer = setInterval(() => tick(s), 100);
}

function goBack() {
  if (animTimer) clearInterval(animTimer);
  document.getElementById('select-screen').style.display = 'block';
  document.getElementById('monitor-screen').style.display = 'none';
}


// ─── BLE設定 ─────────────────────────────────────────
const SERVICE_UUID = '6e400001-b5b3-f393-e0a9-e50e24dcca9e';
const CHAR_TX_UUID = '6e400003-b5b3-f393-e0a9-e50e24dcca9e';
const CHAR_RX_UUID = '6e400002-b5b3-f393-e0a9-e50e24dcca9e';

let bleDevice = null, charTX = null, charRX = null;

async function connectBLE() {
  const btn = document.getElementById('btn-connect');
  const dot = document.getElementById('dot');
  const st  = document.getElementById('status-text');
  try {
    btn.disabled = true;
    btn.textContent = '接続中...';
    dot.className = 'status-dot connecting';
    st.textContent = '接続中...';

    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'SchooMy_001' }],
      optionalServices: [SERVICE_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    charRX = await service.getCharacteristic(CHAR_RX_UUID);
    charTX = await service.getCharacteristic(CHAR_TX_UUID);
    await charTX.startNotifications();
    charTX.addEventListener('characteristicvaluechanged', onData);

    // await sendCmd('SENSOR_MODE');

    dot.className = 'status-dot connected';
    document.getElementById('btn-disconnect').style.display = 'inline-block';
    st.textContent = 'SchooMy_001';
    document.getElementById('connect-screen').style.display = 'none';
    document.getElementById('select-screen').style.display = 'block';

  } catch(e) {
    console.error(e);
    dot.className = 'status-dot';
    st.textContent = '未接続';
    btn.disabled = false;
    btn.textContent = 'BLE接続する';
    if (e.name !== 'NotFoundError') alert('接続失敗: ' + e.message);
  }
}

async function disconnectBLE() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}

async function sendCmd(cmd) {
  if (!charRX) return;
  await charRX.writeValue(new TextEncoder().encode(cmd + '\n'));
}

function onDisconnected() {
  document.getElementById('connect-screen').style.display = 'flex';
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('monitor-screen').style.display = 'none';
  document.getElementById('btn-connect').disabled = false;
  document.getElementById('btn-connect').textContent = 'BLE接続する';
  document.getElementById('btn-disconnect').style.display = 'none';
  document.getElementById('dot').className = 'status-dot';
  document.getElementById('status-text').textContent = '未接続';
  bleDevice = null; charTX = null; charRX = null;
}

function onData(event) {
  const raw = new TextDecoder().decode(event.target.value).trim();
  const dbg = document.getElementById('debug-raw');
  if (dbg) dbg.textContent = 'RX: ' + raw.substring(0, 120);
  try {
    if (raw.startsWith('{')) {
      const d = JSON.parse(raw);
      updateFromBLE(d);
    } else if (raw.includes(',')) {
      // CSV形式: ax,ay,az,gx,gy,gz,temp,abs
      const parts = raw.split(',');
      if (parts.length >= 8) {
        const d = {
          imu: {
            ax: parseFloat(parts[0]),
            ay: parseFloat(parts[1]),
            az: parseFloat(parts[2]),
            gx: parseFloat(parts[3]),
            gy: parseFloat(parts[4]),
            gz: parseFloat(parts[5]),
            temp: parseFloat(parts[6]),
            abs: parseFloat(parts[7])
          },
          temp: parseFloat(parts[6]),
          d33: parts.length > 8 ? parseInt(parts[8]) : undefined,
          a5: parts.length > 9 ? parseFloat(parts[9]) : 0
        };
        updateFromBLE(d);
      }
    }
  } catch(e) { console.error(e); }
}

function updateFromBLE(d) {
  if (!currentSensor) return;
  const s = currentSensor;

  if (s.type === 'imu' && d.imu) {
    sensorHistory.push(d.imu.abs);
    if (sensorHistory.length > HIST) sensorHistory.shift();
    set('imu-ax',   d.imu.ax.toFixed(3));
    set('imu-ay',   d.imu.ay.toFixed(3));
    set('imu-az',   d.imu.az.toFixed(3));
    set('imu-gx',   d.imu.gx.toFixed(1));
    set('imu-gy',   d.imu.gy.toFixed(1));
    set('imu-gz',   d.imu.gz.toFixed(1));
    set('imu-abs',  d.imu.abs.toFixed(4));
    set('imu-temp', d.imu.temp.toFixed(1));
    drawGraph('#3AABA8');
    return;
  }

  if (s.type === 'digital') {
    const val = d.d33 !== undefined ? d.d33 : 0;
    elapsed++;
    if (val === 1 && lastDig === 0) onCount++;
    lastDig = val;
    const b = document.getElementById('d-badge');
    if (b) { b.textContent = val ? 'ON' : 'OFF'; b.className = 'digital-badge ' + (val ? 'on' : 'off'); }
    set('st-now', val ? 'ON' : 'OFF');
    set('st-count', onCount);
    set('st-time', Math.floor(elapsed / 10) + 's');
    return;
  }

  // アナログ系
  let val = null;
  if (s.id === 'temp' || s.id === 'water') val = d.temp !== undefined ? d.temp : (d.imu ? d.imu.temp : null);
  else if (s.id === 'dist') val = d.dist;
  else if (d.a5 !== undefined) {
    // A5センサー各種
    if (s.id === 'light') {
      const v = d.a5 * 3.3 / 4095;
      const vr = Math.max(3.3 - v, 0.01);
      val = +(10000 * v / vr / 1000).toFixed(1);
    } else {
      val = Math.round(d.a5);
    }
  }
  if (val === null || val === undefined) return;

  sensorHistory.push(val);
  if (sensorHistory.length > HIST) sensorHistory.shift();
  set('main-val', typeof val === 'number' ? val.toFixed(s.id === 'light' ? 1 : s.id === 'temp' || s.id === 'water' ? 1 : 0) : val);
  drawGraph(s.color);
  const n = sensorHistory.map(Number);
  set('st-max', Math.max(...n).toFixed(1));
  set('st-min', Math.min(...n).toFixed(1));
  set('st-avg', (n.reduce((a,b)=>a+b,0)/n.length).toFixed(1));
}

// ─── モニター管理 ─────────────────────────────────────
let currentSensor = null, sensorHistory = [], onCount = 0, elapsed = 0, lastDig = 0;
const HIST = 80;

function startMonitor(s) {
  currentSensor = s;
  sensorHistory = []; onCount = 0; elapsed = 0; lastDig = 0;
  // GPIO33コマンド無効化

  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('monitor-screen').style.display = 'block';
  document.getElementById('monitor-title').textContent = s.name;
  buildCard(s);
}

function goBack() {
  // sendCmd('GPIO33:AUTO');
  document.getElementById('select-screen').style.display = 'block';
  document.getElementById('monitor-screen').style.display = 'none';
  currentSensor = null;
}

      </div>
      <div style="font-size:11px;font-weight:700;color:#3AABA8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">加速度 (G)</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
        <div style="background:rgba(58,171,168,0.08);border:1px solid rgba(58,171,168,0.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">X軸</div>
          <div id="imu-ax" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#3AABA8">-</div>
        </div>
        <div style="background:rgba(46,142,196,0.08);border:1px solid rgba(46,142,196,0.2);border-radius:12px;padding:12px;text-align:center">

          <div id="imu-ay" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#2E8EC4">-</div>
        </div>
        <div style="background:rgba(232,138,10,0.08);border:1px solid rgba(232,138,10,0.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Z軸</div>
          <div id="imu-az" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#E88A0A">-</div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#9c27b0;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">ジャイロ (°/s)</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
        <div style="background:rgba(156,39,176,0.08);border:1px solid rgba(156,39,176,0.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">X軸</div>
          <div id="imu-gx" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#ce93d8">-</div>
        </div>
        <div style="background:rgba(156,39,176,0.08);border:1px solid rgba(156,39,176,0.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Y軸</div>
          <div id="imu-gy" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#ce93d8">-</div>
        </div>
        <div style="background:rgba(156,39,176,0.08);border:1px solid rgba(156,39,176,0.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Z軸</div>
          <div id="imu-gz" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#ce93d8">-</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">合成加速度</div>
          <div id="imu-abs" style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:#e8f4f4">-</div>
          <div style="font-size:11px;color:#8ab4bf;margin-top:2px">G</div>
        </div>
        <div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:10px;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">チップ温度</div>
          <div id="imu-temp" style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:#e8f4f4">-</div>
          <div style="font-size:11px;color:#8ab4bf;margin-top:2px">℃</div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#8ab4bf;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">合成加速度グラフ</div>
      <div class="graph-wrap"><svg id="graph-svg"></svg></div>
    </div>`;
  } else if (s.type === 'digital') {
    area.innerHTML = `
    <div class="sensor-card" style="--card-color:${s.color}">
      <div class="card-top">
        <div class="card-svg">${iconHTML(s.iconKey)}</div>
        <div style="flex:1"><div class="card-name">${s.name}</div><div class="card-desc">${s.desc}</div></div>
      </div>
      <div class="digital-display"><span class="digital-badge off" id="d-badge">OFF</span></div>
      <div class="stats">
        <div class="stat-box"><div class="stat-label">現在</div><div class="stat-value" id="st-now">-</div></div>
        <div class="stat-box"><div class="stat-label">ON回数</div><div class="stat-value" id="st-count">0</div></div>
        <div class="stat-box"><div class="stat-label">経過時間</div><div class="stat-value" id="st-time">0s</div></div>
      </div>
    </div>`;
  } else {
    area.innerHTML = `
    <div class="sensor-card" style="--card-color:${s.color}">
      <div class="card-top">
        <div class="card-svg">${iconHTML(s.iconKey)}</div>
        <div style="flex:1"><div class="card-name">${s.name}</div><div class="card-desc">${s.desc}</div></div>
      </div>
      <div class="value-display">
        <span class="big-value" id="main-val">-</span>
        <span class="big-unit">${s.unit}</span>
      </div>
      <div class="graph-wrap"><svg id="graph-svg"></svg></div>
      <div class="stats">
        <div class="stat-box"><div class="stat-label">最大</div><div class="stat-value" id="st-max">-</div></div>
        <div class="stat-box"><div class="stat-label">最小</div><div class="stat-value" id="st-min">-</div></div>
        <div class="stat-box"><div class="stat-label">平均</div><div class="stat-value" id="st-avg">-</div></div>
      </div>
    </div>`;
  }
}

function drawGraph(color) {
  const svg = document.getElementById('graph-svg');
  if (!svg || sensorHistory.length < 2) return;
  const W = svg.parentElement.offsetWidth || 300, H = 100;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  const mn = Math.min(...sensorHistory), mx = Math.max(...sensorHistory), rng = mx - mn || 1;
  const pts = sensorHistory.map((v,i) => `${(i/(HIST-1))*W},${H-((v-mn)/rng)*(H-10)-5}`).join(' ');
  svg.innerHTML = `<defs><linearGradient id="gr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${H} ${pts} ${W},${H}" fill="url(#gr)"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
}

function set(id, v) { const e = document.getElementById(id); if (e) e.textContent = v; }

</script>
